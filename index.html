<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2a1010">
<title>逐玉小遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c8992a;--gold-light:#e8c56a;
  --cream:#fdf5e8;--text-gold:#e8c56a;
  --text-cream:rgba(253,245,232,0.92);
  --text-muted:rgba(253,245,232,0.46);
}
html,body{height:100%;overflow:hidden;background:#2a1010;font-family:'Noto Sans TC',sans-serif}

#app{
  display:flex;flex-direction:column;
  height:100dvh;height:100vh;
  max-width:430px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* BG */
.bg-layer{position:absolute;inset:0;z-index:0}
.bg-img{width:100%;height:100%;object-fit:cover;object-position:center top;opacity:0.75}
.bg-ov{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(80,20,20,.35) 0%,rgba(80,20,20,.08) 30%,rgba(20,5,5,.25) 65%,rgba(10,2,4,.80) 100%)
}

/* PAGES */
.page{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .55s cubic-bezier(.4,0,.2,1)
}
.page.active{opacity:1;pointer-events:all}

/* ━━━ LOGIN ━━━ */
#pgLogin{align-items:center;justify-content:center;padding:40px 32px;gap:0}
.lbrand{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  text-align:center
}
.lbrand-main{
  font-family:'Noto Serif TC',serif;font-size:26px;font-weight:400;
  color:var(--gold-light);letter-spacing:.18em;
  text-shadow:0 0 30px rgba(200,153,42,.4),0 2px 16px rgba(0,0,0,.5);
  animation:floatXi 5s ease-in-out infinite
}
.lbrand-sub{
  font-family:'Noto Serif TC',serif;font-size:14px;font-weight:300;
  color:rgba(253,245,232,.65);letter-spacing:.3em;
  text-shadow:0 1px 10px rgba(0,0,0,.5)
}
@keyframes floatXi{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ldivider{
  width:80px;height:.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:16px 0
}
.ldesc{font-size:12px;color:var(--text-muted);letter-spacing:.08em;text-align:center;line-height:1.9;margin-bottom:26px}
.lform{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.ilabel{font-size:10px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px;display:block}
.linput{
  width:100%;background:rgba(200,153,42,.06);
  border:.5px solid rgba(200,153,42,.28);border-radius:10px;
  padding:12px 16px;font-family:'Noto Sans TC',sans-serif;
  font-size:14px;color:var(--cream);outline:none;letter-spacing:.05em;
  transition:border-color .2s,background .2s;-webkit-appearance:none
}
.linput::placeholder{color:rgba(200,153,42,.7)}
.linput:focus{border-color:rgba(200,153,42,.6);background:rgba(200,153,42,.1)}
.lbtn{
  margin-top:6px;background:rgba(200,153,42,.13);
  border:.5px solid rgba(200,153,42,.48);border-radius:28px;
  padding:13px 0;font-family:'Noto Serif TC',serif;
  font-size:15px;color:var(--gold-light);letter-spacing:.3em;
  cursor:pointer;width:100%;transition:background .2s;
  -webkit-tap-highlight-color:transparent
}
.lbtn:active{background:rgba(200,153,42,.25)}
.lerr{font-size:11px;color:#e88;text-align:center;letter-spacing:.05em;height:16px}
.llboard{
  margin-top:18px;font-size:11px;color:var(--text-muted);
  letter-spacing:.1em;cursor:pointer;
  border-bottom:.5px solid rgba(253,245,232,.18);padding-bottom:2px;
  transition:color .2s
}
.llboard:hover{color:var(--gold-light)}

/* ━━━ TRAIN ━━━ */
#pgTrain{flex-direction:column}
.vwrap{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;
  border:2px solid transparent;
  background-clip:padding-box;
  box-shadow:0 0 0 2px #1a0a0a, 0 0 0 4px rgba(200,153,42,0.7), 0 0 0 6px #0d0508, 0 0 0 8px rgba(200,153,42,0.3);
  margin:6px}
#vid{width:100%;height:100%;object-fit:cover;opacity:.88}
.vid-loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  background:rgba(10,2,4,.7);z-index:3;
  transition:opacity .4s;pointer-events:none
}
.vid-loading.hidden{opacity:0}
.vid-spinner{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(200,153,42,.2);
  border-top-color:var(--gold);
  animation:spin .8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.vid-loading-text{font-size:11px;color:var(--text-muted);letter-spacing:.1em}

.bottom{
  position:relative;z-index:10;
  background:rgba(6,1,3,.86);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:.5px solid rgba(200,153,42,.16);
  padding:10px 20px 22px;
  display:flex;flex-direction:column;align-items:center;gap:9px
}
.ustrip{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding-bottom:8px;
  border-bottom:.5px solid rgba(200,153,42,.1)
}
.uname{font-size:12px;color:var(--gold-light);letter-spacing:.08em}
.navlinks{display:flex;gap:12px}
.navlink{font-size:10px;color:var(--text-muted);letter-spacing:.1em;cursor:pointer;transition:color .2s}
.navlink:hover{color:var(--gold-light)}

.binforow{
  display:flex;align-items:center;
  justify-content:center;width:100%;position:relative
}
.bword{
  font-family:'Noto Serif TC',serif;font-size:24px;font-weight:300;
  color:var(--text-cream);letter-spacing:.4em;
  opacity:0;transition:opacity .25s;text-align:center
}
.bword.show{opacity:1}
.brem{
  font-size:11px;color:var(--text-muted);letter-spacing:.08em;
  text-align:right;opacity:0;transition:opacity .3s;
  position:absolute;right:0
}
.brem.show{opacity:1}

.pstrip{display:flex;align-items:center;gap:6px;justify-content:center}
.pdot{display:flex;flex-direction:column;align-items:center;gap:3px}
.pdoti{
  width:7px;height:7px;border-radius:50%;
  background:rgba(200,153,42,.18);border:.5px solid rgba(200,153,42,.28);
  transition:background .4s,transform .3s
}
.pdot.active .pdoti{background:var(--gold);transform:scale(1.35)}
.pdot.done  .pdoti{background:rgba(200,153,42,.45)}
.pdotl{font-size:9px;color:var(--text-muted)}
.pdot.active .pdotl{color:var(--gold-light)}
.pcon{width:24px;height:.5px;background:rgba(200,153,42,.18);margin-bottom:12px}

.progwrap{width:100%;height:2px;background:rgba(200,153,42,.1);border-radius:1px;overflow:hidden}
.progfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:1px;transition:width .25s linear;width:0%}

.btnarea{display:flex;flex-direction:column;align-items:center;gap:7px}
.bhint{font-size:11px;color:var(--text-muted);letter-spacing:.1em}
.bringwrap{position:relative;width:78px;height:78px;display:flex;align-items:center;justify-content:center}
.ripple{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(200,153,42,.22);
  transform:scale(1);opacity:0;pointer-events:none
}
.ripple.active{animation:rippleA 1.2s ease-out infinite}
@keyframes rippleA{0%{transform:scale(.75);opacity:.55}100%{transform:scale(1.95);opacity:0}}
.bbtn{
  width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(200,153,42,.11);outline:1px solid rgba(200,153,42,.32);
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  transition:transform .5s cubic-bezier(.4,0,.2,1),background .3s,outline-color .3s;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none
}
.bbtn.inhale{transform:scale(1.32);background:rgba(200,153,42,.22);outline:1px solid rgba(200,153,42,.6)}
.bbtn.exhale{transform:scale(.74);background:rgba(200,153,42,.05);outline:1px solid rgba(200,153,42,.18)}

.statsrow{display:flex;gap:28px}
.stat{display:flex;flex-direction:column;align-items:center;gap:1px}
.sval{font-size:19px;font-weight:400;color:var(--text-gold);font-family:'Noto Serif TC',serif}
.slbl{font-size:9px;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase}

/* 影片由 Supabase Storage 自動載入，無需上傳 UI */

/* ━━━ EXIT ━━━ */
#pgExit{
  align-items:center;justify-content:center;
  flex-direction:column;gap:0;
  background:rgba(8,2,4,.95)
}
.exi{
  font-family:'Noto Serif TC',serif;font-size:80px;color:var(--gold);
  opacity:0;transform:scale(.5) rotate(-8deg);
  transition:opacity .7s,transform .7s cubic-bezier(.175,.885,.32,1.275);
  text-shadow:0 0 60px rgba(200,153,42,.5)
}
.exi.show{opacity:1;transform:scale(1) rotate(0)}
.etitle{
  font-family:'Noto Serif TC',serif;font-size:22px;
  color:var(--text-gold);letter-spacing:.5em;
  opacity:0;transform:translateY(16px);
  transition:opacity .6s .35s,transform .6s .35s;margin-top:16px
}
.etitle.show{opacity:1;transform:translateY(0)}
.esub{
  font-size:12px;color:var(--text-muted);letter-spacing:.12em;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s .6s,transform .6s .6s;margin-top:8px
}
.esub.show{opacity:1;transform:translateY(0)}
.estats{
  display:flex;gap:36px;margin-top:28px;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s .85s,transform .6s .85s
}
.estats.show{opacity:1;transform:translateY(0)}
.estat{display:flex;flex-direction:column;align-items:center;gap:4px}
.estatv{font-family:'Noto Serif TC',serif;font-size:30px;color:var(--gold-light)}
.estatl{font-size:10px;color:var(--text-muted);letter-spacing:.12em}
.ediv{
  width:80px;height:.5px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:24px 0;opacity:0;transition:opacity .6s 1.1s
}
.ediv.show{opacity:1}
.ebtnrow{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;transform:translateY(10px);
  transition:opacity .5s 1.3s,transform .5s 1.3s
}
.ebtnrow.show{opacity:1;transform:translateY(0)}
.ebtn{
  background:rgba(200,153,42,.14);border:.5px solid rgba(200,153,42,.45);
  border-radius:28px;padding:12px 36px;font-family:'Noto Serif TC',serif;
  font-size:14px;color:var(--gold-light);letter-spacing:.25em;cursor:pointer;
  transition:background .2s;-webkit-tap-highlight-color:transparent
}
.ebtn:active{background:rgba(200,153,42,.25)}
.ebtn2{
  background:transparent;border:none;font-size:11px;color:var(--text-muted);
  letter-spacing:.1em;cursor:pointer;padding:4px 0;
  border-bottom:.5px solid rgba(253,245,232,.18);
  -webkit-tap-highlight-color:transparent
}
.petal{
  position:absolute;pointer-events:none;z-index:5;
  opacity:0;animation:petalFall linear forwards
}
@keyframes petalFall{0%{opacity:.9;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(360deg)}}

/* ━━━ LEADERBOARD ━━━ */
#pgLeader{flex-direction:column;background:rgba(8,2,4,.92)}
.lhdr{
  padding:52px 24px 14px;display:flex;flex-direction:column;
  align-items:center;gap:5px;border-bottom:.5px solid rgba(200,153,42,.14);flex-shrink:0
}
.lhdrtitle{font-family:'Noto Serif TC',serif;font-size:18px;color:var(--text-gold);letter-spacing:.35em}
.lhdrsub{font-size:10px;color:var(--text-muted);letter-spacing:.12em}
.lscroll{flex:1;overflow-y:auto;padding:12px 20px 24px;-webkit-overflow-scrolling:touch}
.lscroll::-webkit-scrollbar{display:none}
.lempty{text-align:center;color:var(--text-muted);font-size:13px;padding:40px 0;letter-spacing:.08em}
.lrow{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:10px;border:.5px solid transparent;
  margin-bottom:8px;transition:border-color .3s;
  animation:rowSlide .4s ease both
}
@keyframes rowSlide{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.lrow:nth-child(1){background:rgba(200,153,42,.1);border-color:rgba(200,153,42,.3)}
.lrow:nth-child(2){background:rgba(200,153,42,.06);border-color:rgba(200,153,42,.18)}
.lrow:nth-child(3){background:rgba(200,153,42,.04);border-color:rgba(200,153,42,.12)}
.rankn{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:'Noto Serif TC',serif;font-size:13px;flex-shrink:0
}
.lrow:nth-child(1) .rankn{background:var(--gold);color:#1a0508}
.lrow:nth-child(2) .rankn{background:rgba(200,153,42,.35);color:var(--gold-light)}
.lrow:nth-child(3) .rankn{background:rgba(200,153,42,.2);color:var(--gold-light)}
.rankn.other{background:rgba(200,153,42,.1);color:var(--text-muted)}
.rankinfo{flex:1}
.rankname{font-size:14px;color:var(--text-cream);letter-spacing:.05em}
.rankemail{font-size:10px;color:var(--text-muted);margin-top:1px}
.ranktime{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold-light)}
.rankcyc{font-size:10px;color:var(--text-muted);text-align:right;margin-top:1px}
.lback{flex-shrink:0;padding:14px 20px 28px;display:flex;justify-content:center;border-top:.5px solid rgba(200,153,42,.1)}
.backbtn{
  background:transparent;border:.5px solid rgba(200,153,42,.28);border-radius:24px;
  padding:10px 32px;font-size:11px;color:var(--text-muted);letter-spacing:.14em;
  cursor:pointer;transition:color .2s,border-color .2s;-webkit-tap-highlight-color:transparent
}
.backbtn:active{color:var(--gold-light);border-color:var(--gold)}
.mebadge{
  font-size:9px;background:rgba(200,153,42,.25);color:var(--gold);
  border-radius:8px;padding:2px 7px;letter-spacing:.08em;
  margin-left:4px;vertical-align:middle
}
</style>
</head>

// Bucket 名稱（在 Supabase Storage 建立，設為 public）
const VIDEO_BUCKET = 'breath-videos';
// 三個階段對應的影片檔名（上傳到 Supabase Storage 後填入）
const VIDEO_FILES = [
  'phase1.mp4',   // 第一階段影片
  'phase2.mp4',   // 第二階段影片
  'phase3.mp4',   // 第三階段影片
];
// ══════════════════════════════════════════════════════════

let sb = null;
try { sb = supabase.createClient(SB_URL, SB_ANON); } catch(e) {}

// ── PHASE CONFIG ──────────────────────────────────
const PHASES = [
  {name:'第一階段',inhale:1000,exhale:1000,duration:30},
  {name:'第二階段',inhale:2000,exhale:3000,duration:45},
  {name:'第三階段',inhale:1000,exhale:1000,duration:30},
];

// ── USER ──────────────────────────────────────────
let user = JSON.parse(localStorage.getItem('bu')||'null');
let prevPage = 'pgLogin';

// ── VIDEO URLS（從 Supabase 取得的公開 URL）────────
let videoUrls = [null, null, null];

// ── TRAIN STATE ───────────────────────────────────
let pressed=false,phaseIdx=0,breathPhase='inhale';
let phaseTmr=null,phaseTickR=null;
let sesStart=null,sesTick=null;
let cycles=0,totalSec=0;

// ── UTILS ─────────────────────────────────────────
const fmt=s=>{const m=Math.floor(s/60),ss=Math.floor(s%60);return`${m}:${ss.toString().padStart(2,'0')}`};
const el=id=>document.getElementById(id);

// ── PAGE NAV ──────────────────────────────────────
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));el(id).classList.add('active')}

// ── INIT ──────────────────────────────────────────
(async function init(){
  // 從 Supabase Storage 取得影片 URL
  await loadVideoUrls();
  if(user){el('unameDisp').textContent=user.name;show('pgTrain')}
})();

// ── 從 Supabase Storage 取得影片公開 URL ─────────────
async function loadVideoUrls(){
  if(!sb) return;
  try{
    VIDEO_FILES.forEach((filename, i) => {
      const { data } = sb.storage
        .from(VIDEO_BUCKET)
        .getPublicUrl(filename);
      if(data?.publicUrl) videoUrls[i] = data.publicUrl;
    });
  }catch(e){ console.warn('無法載入影片 URL:', e); }
}

// ── LOGIN ─────────────────────────────────────────
function doLogin(){
  const name=el('iName').value.trim(),email=el('iEmail').value.trim();
  const err=el('loginErr');
  if(!name){err.textContent='請輸入姓名';return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='請輸入有效的信箱';return}
  err.textContent='';
  user={name,email};
  localStorage.setItem('bu',JSON.stringify(user));
  el('unameDisp').textContent=name;
  prevPage='pgLogin';
  show('pgTrain');
  resetState();
}

function doLogout(){
  vid.pause();clearAll();pressed=false;
  el('bbtn').classList.remove('inhale','exhale');
  el('bword').classList.remove('show');
  el('brem').classList.remove('show');
  el('ripple').classList.remove('active');
  user=null;localStorage.removeItem('bu');
  show('pgLogin');
}

// ── LEADERBOARD ───────────────────────────────────
function showLeader(from){
  prevPage=from||document.querySelector('.page.active').id;
  show('pgLeader');
  loadLeader();
}
function goBack(){show(prevPage||'pgLogin')}

async function loadLeader(){
  const list=el('llist');
  list.innerHTML='<div class="lempty">載入中…</div>';
  let rows=[];
  if(sb){
    try{
      const{data,error}=await sb.from('breath_sessions')
        .select('*').order('total_seconds',{ascending:false}).limit(50);
      if(!error&&data)rows=data;
    }catch(e){}
  }
  // Demo fallback
  if(!rows.length){
    rows=[
      {user_name:'林小美',user_email:'mei@example.com',total_seconds:105,cycles:87},
      {user_name:'陳大偉',user_email:'wei@example.com',total_seconds:98,cycles:76},
      {user_name:'王雅婷',user_email:'ting@example.com',total_seconds:92,cycles:71},
      {user_name:'張志明',user_email:'ming@example.com',total_seconds:85,cycles:62},
      {user_name:'李詩涵',user_email:'han@example.com',total_seconds:79,cycles:58},
    ];
    if(user&&totalSec>0){
      rows.push({user_name:user.name,user_email:user.email,total_seconds:Math.round(totalSec),cycles});
      rows.sort((a,b)=>b.total_seconds-a.total_seconds);
    }
  }
  if(!rows.length){list.innerHTML='<div class="lempty">尚無訓練記錄</div>';return}
  list.innerHTML='';
  rows.forEach((r,i)=>{
    const isMe=user&&r.user_email===user.email;
    const rnk=document.createElement('div');
    rnk.className='lrow';
    rnk.style.animationDelay=`${i*.06}s`;
    rnk.innerHTML=`
      <div class="rankn${i>=3?' other':''}">${i+1}</div>
      <div class="rankinfo">
        <div class="rankname">${r.user_name}${isMe?'<span class="mebadge">我</span>':''}</div>
        <div class="rankemail">${r.user_email}</div>
      </div>
      <div><div class="ranktime">${fmt(r.total_seconds)}</div><div class="rankcyc">${r.cycles} 次</div></div>`;
    list.appendChild(rnk);
  });
}

// ── VIDEO ─────────────────────────────────────────
const vid=el('vid');

function loadVid(i){
  const url = videoUrls[i];
  if(!url) return;
  if(vid.dataset.li===String(i)) return;

  const loader = el('vidLoading');
  const loaderText = el('vidLoadingText');
  loader.classList.remove('hidden');
  loaderText.textContent = '載入影片中…';

  vid.src = url;
  vid.load();
  vid.dataset.li = i;

  vid.oncanplay = () => {
    loader.classList.add('hidden');
  };
  vid.onerror = () => {
    loaderText.textContent = '影片載入失敗';
  };
}

// ── TRAIN CORE ────────────────────────────────────
const dots=[el('d0'),el('d1'),el('d2')];

function clearAll(){
  clearTimeout(phaseTmr);clearInterval(phaseTickR);clearInterval(sesTick);
}
function resetState(){
  clearAll();phaseIdx=0;cycles=0;totalSec=0;
  sesStart=null;sesTick=null;pressed=false;
  el('cycDisp').textContent='0';el('totDisp').textContent='0:00';
  el('progfill').style.width='0%';
  updateDots();
  el('bword').classList.remove('show');el('brem').classList.remove('show');
  el('ripple').classList.remove('active');el('bbtn').classList.remove('inhale','exhale');
  el('bhint').textContent='按住開始 · 放開暫停';
  vid.pause();
}
function resetTrain(){resetState();show('pgTrain')}
function updateDots(){dots.forEach((d,i)=>{d.classList.remove('active','done');if(i===phaseIdx)d.classList.add('active');else if(i<phaseIdx)d.classList.add('done')})}

function startSes(){
  if(sesStart)return;
  sesStart=Date.now();
  sesTick=setInterval(()=>{totalSec=(Date.now()-sesStart)/1000;el('totDisp').textContent=fmt(totalSec)},500);
}
function startTick(){
  clearInterval(phaseTickR);
  const cfg=PHASES[phaseIdx];
  phaseElapsed=0;
  phaseTickR=setInterval(()=>{
    if(!pressed)return;
    phaseElapsed+=.25;
    const rem=Math.max(0,cfg.duration-phaseElapsed);
    el('brem').textContent=`剩餘 ${Math.ceil(rem)} 秒`;
    el('progfill').style.width=`${Math.min(100,(phaseElapsed/cfg.duration)*100)}%`;
    if(phaseElapsed>=cfg.duration){clearInterval(phaseTickR);nextPhase()}
  },250);
}
function nextPhase(){
  clearTimeout(phaseTmr);clearInterval(phaseTickR);
  phaseIdx++;
  if(phaseIdx>=PHASES.length){
    onRelease({});clearInterval(sesTick);sesTick=null;
    doExit();return;
  }
  el('progfill').style.width='0%';
  updateDots();vid.dataset.li='';vid.pause();loadVid(phaseIdx);
  breathPhase='inhale';if(pressed)runBreath();
}
function runBreath(){
  clearTimeout(phaseTmr);
  const cfg=PHASES[phaseIdx];
  if(breathPhase==='inhale'){
    el('bword').textContent='吸　氣';
    el('bbtn').classList.remove('exhale');el('bbtn').classList.add('inhale');
    phaseTmr=setTimeout(()=>{if(!pressed)return;breathPhase='exhale';runBreath()},cfg.inhale);
  }else{
    el('bword').textContent='吐　氣';
    el('bbtn').classList.remove('inhale');el('bbtn').classList.add('exhale');
    phaseTmr=setTimeout(()=>{if(!pressed)return;cycles++;el('cycDisp').textContent=cycles;breathPhase='inhale';runBreath()},cfg.exhale);
  }
}
function onPress(e){
  if(e&&e.preventDefault)e.preventDefault();
  if(pressed||!user)return;
  pressed=true;startSes();startTick();breathPhase='inhale';
  el('bword').classList.add('show');el('brem').classList.add('show');
  el('ripple').classList.add('active');el('bhint').textContent='放開即暫停';
  loadVid(phaseIdx);if(videoUrls[phaseIdx])vid.play().catch(()=>{});
  runBreath();
}
function onRelease(e){
  if(!pressed)return;pressed=false;
  clearTimeout(phaseTmr);clearInterval(phaseTickR);
  el('bbtn').classList.remove('inhale','exhale');
  el('bword').classList.remove('show');el('brem').classList.remove('show');
  el('ripple').classList.remove('active');
  el('bhint').textContent='按住繼續 · 放開暫停';
  vid.pause();
  vid.currentTime=0;
  phaseElapsed=0;
  const cfg=PHASES[phaseIdx];
  el('brem').textContent='剩餘 '+cfg.duration+' 秒';
  el('progfill').style.width='0%';
}
document.addEventListener('mouseup',onRelease);
document.addEventListener('touchend',onRelease);

// ── EXIT ANIMATION ────────────────────────────────
function doExit(){
  saveSession();
  el('etime').textContent=fmt(totalSec);
  el('ecyc').textContent=cycles;
  ['etitle','esub','estats','ediv','ebtnrow'].forEach(id=>el(id).classList.remove('show'));
  show('pgExit');
  setTimeout(()=>el('etitle').classList.add('show'),80);
  setTimeout(()=>el('esub').classList.add('show'),260);
  setTimeout(()=>el('estats').classList.add('show'),720);
  setTimeout(()=>el('ediv').classList.add('show'),970);
  setTimeout(()=>el('ebtnrow').classList.add('show'),1220);
  for(let i=0;i<20;i++)setTimeout(()=>petal(),i*110+Math.random()*180);
}
function petal(){
  const syms=['✿','❀','✾','❁','✦','✧','❋','❊'];
  const p=document.createElement('div');
  p.className='petal';
  p.textContent=syms[Math.floor(Math.random()*syms.length)];
  p.style.left=Math.random()*100+'vw';
  p.style.top='-20px';
  p.style.color=Math.random()>.5?'#e8c56a':'#d4748a';
  p.style.fontSize=(11+Math.random()*10)+'px';
  p.style.animationDuration=(2.2+Math.random()*2.2)+'s';
  el('pgExit').appendChild(p);
  p.style.opacity='1';
  setTimeout(()=>p.remove(),5000);
}

// ── SAVE ──────────────────────────────────────────
async function saveSession(){
  if(!sb||!user)return;
  try{
    await sb.from('breath_sessions').insert({
      user_name:user.name,user_email:user.email,
      total_seconds:Math.round(totalSec),cycles,completed:true
    });
  }catch(e){}
}
</script>
